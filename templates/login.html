<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wildland Dashboard Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body class="login-shell">
    <main class="login-card">
      <p class="eyebrow">Invited access</p>
      <h1>Wildland Dashboard</h1>
      <p class="subtle">Enter the viewer PIN to continue.</p>
      {% if error %}
      <div class="alert">{{ error }}</div>
      {% endif %}
      <form method="post" class="login-form">
        <label for="pin">PIN</label>
        <input id="pin" name="pin" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter PIN" required>
        <button type="submit">Enter dashboard</button>
      </form>
    </main>
  </body>
</html>
