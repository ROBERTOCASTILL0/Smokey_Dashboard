services:
  - type: web
    name: wildland-dashboard
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python collector.py refresh || true
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 90
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: ACCESS_PIN
        sync: false
      - key: SESSION_HOURS
        value: '24'
      - key: PUSH_TOKEN
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: 'true'
      - key: MAX_SNAPSHOT_BYTES
        value: 1048576
